# mise: https://mise.jdx.dev/
#
# `mise install` installs everything under [tools]; `mise run <task>`
# delegates to pnpm scripts in package.json. `.nvmrc` stays authoritative —
# mise reads it.

[tools]
node = "24"
pnpm = "10"

[env]
_.file = { path = ".env", optional = true }

[tasks.init]
description = "Rename this template to a new project (see scripts/init.py)"
run = "python3 scripts/init.py"

[tasks.install]
description = "pnpm install --frozen-lockfile"
run = "pnpm install --frozen-lockfile"

[tasks.lint]
description = "Biome lint + format check"
run = "pnpm lint"

[tasks.format]
description = "Biome format --write"
run = "pnpm format"

[tasks.typecheck]
description = "tsc --noEmit"
run = "pnpm typecheck"

[tasks.test]
description = "vitest run --coverage"
run = "pnpm test"

[tasks.build]
description = "tsc -p tsconfig.build.json"
run = "pnpm build"

[tasks.ci]
description = "Full CI gate"
depends = ["lint", "typecheck", "test", "build"]

[tasks.ci-watch]
description = "Watch GitHub Actions CI for the current branch; exits non-zero on failure"
run = """
sleep 5
run_id=$(gh run list --branch "$(git branch --show-current)" --limit 1 --json databaseId --jq '.[0].databaseId')
if [ -z "$run_id" ]; then echo "No run found for current branch" >&2; exit 1; fi
gh run watch --exit-status "$run_id"
"""
